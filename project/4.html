Je suis globalement content de ce que j'ai produit. Il y aura potentiellement des améliorations d'interface et autres si l'envie me prend.\",\"descriptionEn\":\"This application came about thanks to a project proposal from Frontend Mentor. The main objective was to develop a web application that would provide weather information, allow users to search for a city, and more. It's a project I started in my free time. I'm generally happy with what I've produced. There will potentially be interface improvements and other enhancements if I feel like it.\",\"image\":[\"/WeatherApp/interface1.png\",\"/WeatherApp/interface2.png\",\"/WeatherApp/interface3.png\",\"/WeatherApp/interface4.png\",\"/WeatherApp/interface5.png\"],\"link\":\"https://josueprlt.github.io/weather-app-main/\",\"github\":\"https://github.com/josueprlt/weather-app-main\"},{\"id\":2,\"title\":\"Lagendary\",\"titleEn\":\"Lagendary\",\"date\":\"2024-11-23\",\"category\":[\"Scolaire\",\"Dev Web\",\"next\",\"tailwind\",\"symfony\",\"docker\",\"github\",\"vscode\",\"trello\"],\"description\":\"Ce projet scolaire a été réalisé en groupe de cinq personnes. L'objectif principal était de développer une application web permettant de planifier des événements, de les rejoindre et de visualiser les événements à venir sous forme de calendrier. Nous avons travaillé de manière agile, en suivant des sprints, sur une période de plus de quatre semaines. En plus de ces fonctionnalités principales, l'application proposait la création de compte, la connexion des utilisateurs, ainsi qu'un espace backoffice réservé aux administrateurs.\",\"descriptionEn\":\"This school project was carried out in a group of five people. The main objective was to develop a web application that allows users to plan events, join them, and view upcoming events in a calendar format. We worked in an agile manner, following sprints, over a period of more than four weeks. In addition to these main features, the application offered account creation, user login, and a back office space reserved for administrators.\",\"image\":[\"/Lagendary/lagendary1.png\",\"/Lagendary/lagendary2.png\",\"/Lagendary/lagendary3.png\",\"/Lagendary/lagendary4.png\",\"/Lagendary/lagendary5.png\",\"/Lagendary/lagendary6.png\",\"/Lagendary/lagendary7.png\",\"/Lagendary/lagendary8.png\",\"/Lagendary/lagendary9.png\",\"/Lagendary/lagendary10.png\",\"/Lagendary/lagendary11.png\",\"/Lagendary/lagendary12.png\",\"/Lagendary/lagendary13.png\",\"/Lagendary/lagendary14.png\",\"/Lagendary/lagendary15.png\",\"/Lagendary/lagendary16.png\"],\"link\":null,\"github\":\"https://github.com/josueprlt/Sae-501-GroupeC-clone\"},{\"id\":3,\"title\":\"Monstercat\",\"titleEn\":\"Monstercat\",\"date\":\"2024-12-20\",\"category\":[\"Scolaire\",\"Dev Web\",\"react\",\"tailwind\",\"github\",\"vscode\"],\"description\":\"Ce projet scolaire a été réalisé en solo. L’objectif était de reproduire le site Monstercat en suivant les consignes du site Frontend Practice. Il s’agissait d’un projet purement frontend, dont la mission était d’intégrer la maquette fournie. Les technologies utilisées sont ReactJS et TailwindCSS.\",\"descriptionEn\":\"This school project was carried out individually. The objective was to reproduce the Monstercat website by following the guidelines of the Frontend Practice site. It was a purely frontend project, with the mission of integrating the provided mockup. The technologies used are ReactJS and TailwindCSS.\",\"image\":[\"/Monstercat/monstercat1.png\",\"/Monstercat/monstercat2.png\",\"/Monstercat/monstercat3.png\",\"/Monstercat/monstercat4.png\",\"/Monstercat/monstercat5.png\",\"/Monstercat/monstercat6.png\",\"/Monstercat/monstercat7.png\"],\"link\":null,\"github\":\"https://github.com/josueprlt/BUT3_Dev_24_front_website\"},\"$7:0:props:project\",{\"id\":5,\"title\":\"HellCleaner VR\",\"titleEn\":\"HellCleaner VR\",\"date\":\"2024-02-23\",\"category\":[\"Scolaire\",\"Dev Web\",\"vr\",\"html\",\"css\",\"javascript\",\"github\",\"vscode\"],\"description\":\"Ce projet scolaire a été réalisé en trinôme. L’objectif était de concevoir un mini-jeu en réalité virtuelle sur le thème de la pollution et du recyclage. Le joueur pouvait se déplacer en VR ou de manière classique dans une ville où des déchets étaient dispersés. L’objectif du jeu était de collecter tous les déchets, placés aléatoirement sur la carte. Le projet a été développé en HTML, CSS et JavaScript, à l’aide de la bibliothèque A-Frame.\",\"descriptionEn\":\"This school project was carried out in a group of three. The objective was to design a mini-game in virtual reality on the theme of pollution and recycling. The player could move in VR or in a classic way in a city where waste was scattered. The goal of the game was to collect all the waste, placed randomly on the map. The project was developed using HTML, CSS, and JavaScript, using the A-Frame library.\",\"image\":[\"/Sae402-VR/city1.png\",\"/Sae402-VR/city2.png\",\"/Sae402-VR/city3.png\",\"/Sae402-VR/city4.png\",\"/Sae402-VR/city5.png\",\"/Sae402-VR/city6.png\",\"/Sae402-VR/city7.png\",\"/Sae402-VR/city8.png\",\"/Sae402-VR/city9.png\",\"/Sae402-VR/city10.png\",\"/Sae402-VR/city11.png\",\"/Sae402-VR/city12.png\",\"/Sae402-VR/city13.png\",\"/Sae402-VR/city14.png\",\"/Sae402-VR/city15.png\"],\"link\":null,\"github\":\"https://github.com/josueprlt/Sae402-HellCleaner-VR\"},{\"id\":6,\"title\":\"Challenge BenjaminCode\",\"titleEn\":\"BenjaminCode Challenge\",\"date\":\"2023-09-13\",\"category\":[\"Personnel\",\"Dev Web\",\"html\",\"css\",\"javascript\",\"vscode\"],\"description\":\"Dans le cadre personnel, le but était de retranscrire en html, css et javascript la template de la page qui nous était donnée par BenjaminCode.\",\"descriptionEn\":\"In a personal context, the goal was to transcribe in HTML, CSS, and JavaScript the template of the page that was given to us by BenjaminCode.\",\"image\":[\"/BenjaminCode/projetaccueil.png\",\"/BenjaminCode/projetfinis.png\",\"/BenjaminCode/template.png\"],\"link\":null,\"github\":null},{\"id\":7,\"title\":\"Intégration composant vidéo\",\"titleEn\":\"Video Component Integration\",\"date\":\"2024-07-22\",\"category\":[\"Personnel\",\"Dev Web\",\"react\",\"sass\",\"github\",\"vscode\"],\"description\":\"Personnellement, j'ai découvert une maquette de ce composant sur Internet. Cela m'a donné l'idée de l'intégrer en utilisant React et Sass.\",\"descriptionEn\":\"Personally, I discovered a mockup of this component on the Internet. This gave me the idea to integrate it using React and Sass.\",\"image\":[\"/ComposantVideo/component-video-img-1.png\",\"/ComposantVideo/component-video-img-2.png\",\"/ComposantVideo/component-video-img-3.png\",\"/ComposantVideo/component-video-img-4.png\",\"/ComposantVideo/component-video-img-5.png\",\"/ComposantVideo/component-video-img-6.png\"],\"link\":null,\"github\":null},{\"id\":8,\"title\":\"Portfolio Web 2023-2024\",\"titleEn\":\"Web Portfolio 2023-2024\",\"date\":\"2023-06-01\",\"category\":[\"Personnel\",\"Dev Web\",\"html\",\"css\",\"javascript\",\"php\",\"mysql\",\"vscode\"],\"description\":\"Ceci est la première version de mon portfolio en ligne. Cependant, il ne reflétait plus mes compétences actuelles ni mon style. Il était donc temps de créer un nouveau portfolio, plus moderne et représentatif de mon évolution. Ce projet personnel a été réalisé dans le but de mettre en avant mes compétences et les projets que j'ai réalisés.\",\"descriptionEn\":\"This is the first version of my online portfolio. However, it no longer reflected my current skills or my style. It was therefore time to create a new portfolio, more modern and representative of my evolution. This personal project was created to showcase my skills and the projects I have completed.\",\"image\":[\"/Portfolio2023/portfolio1.png\",\"/Portfolio2023/portfolio2.png\",\"/Portfolio2023/portfolio3.png\",\"/Portfolio2023/portfolio4.png\",\"/Portfolio2023/portfolio5.png\"],\"link\":null,\"github\":null},{\"id\":9,\"title\":\"Site OnePage\",\"titleEn\":\"OnePage Site\",\"date\":\"2022-12-03\",\"category\":[\"Scolaire\",\"Dev Web\",\"html\",\"css\",\"javascript\",\"vscode\"],\"description\":\"Dans le contexte scolaire, il m'a été demandé de créer un site OnePage en utilisant trois langages de programmation : le HTML, le CSS et le JavaScript. J'ai dû me familiariser avec un environnement de développement intégré tel que Visual Studio Code. Ce site n'est plus disponible.\",\"descriptionEn\":\"In the school context, I was asked to create a OnePage site using three programming languages: HTML, CSS, and JavaScript. I had to familiarize myself with an integrated development environment such as Visual Studio Code. This site is no longer available.\",\"image\":[\"/SiteOnePage/screen2.png\",\"/SiteOnePage/screen3.png\",\"/SiteOnePage/screen1.png\",\"/SiteOnePage/visual1.png\",\"/SiteOnePage/visual2.png\",\"/SiteOnePage/visual3.png\"],\"link\":null,\"github\":null},{\"id\":10,\"title\":\"Site de trailer de films\",\"titleEn\":\"Movie Trailer Site\",\"date\":\"2023-03-22\",\"category\":[\"Scolaire\",\"Dev Web\",\"html\",\"css\",\"javascript\",\"php\",\"mysql\",\"vscode\"],\"description\":\"Dans le cadre scolaire, nous devions concevoir un site intégrant une base de données. La structure du projet était divisée en plusieurs parties nommées 'itérations'.\",\"descriptionEn\":\"In the school context, we had to design a site that integrates a database. The structure of the project was divided into several parts called 'iterations'.\",\"image\":[\"/Sae203/website1.png\",\"/Sae203/website2.png\",\"/Sae203/website3.png\",\"/Sae203/website4.png\",\"/Sae203/website5.png\",\"/Sae203/website6.png\",\"/Sae203/website7.png\",\"/Sae203/website8.png\",\"/Sae203/website9.png\",\"/Sae203/code1.png\",\"/Sae203/code2.png\",\"/Sae203/code3.png\",\"/Sae203/code4.png\",\"/Sae203/code5.png\"],\"link\":null,\"github\":null},{\"id\":11,\"title\":\"Nouveau Portfolio Web\",\"titleEn\":\"New Web Portfolio\",\"date\":\"2025-03-15\",\"category\":[\"Personnel\",\"Dev Web\",\"next\",\"tailwind\",\"github\",\"vscode\"],\"description\":\"Mon nouveau portfolio arbore un style plus moderne et soigné. Comme l’ancien, ce projet personnel a pour objectif de présenter mes compétences et mes réalisations. Cependant, cette nouvelle version se distingue par un design plus élégant et des fonctionnalités avancées, comme un filtre pour trier les projets. Ce portfolio a été développé avec Next.js et TailwindCSS.\",\"descriptionEn\":\"My new portfolio features a more modern and polished style. Like the previous one, this personal project aims to showcase my skills and achievements. However, this new version stands out with a more elegant design and advanced features, such as a filter to sort projects. This portfolio was developed with Next.js and TailwindCSS.\",\"image\":[\"/Portfolio2025/portfolio1.png\",\"/Portfolio2025/portfolio2.png\",\"/Portfolio2025/portfolio3.png\",\"/Portfolio2025/portfolio4.png\"],\"link\":\"https://portfolio-josue.com/\",\"github\":\"https://github.com/josueprlt/portfolio-4.0/tree/V8\"},{\"id\":12,\"title\":\"Coachella\",\"titleEn\":\"Coachella\",\"date\":\"2024-01-07\",\"category\":[\"Scolaire\",\"Crea\",\"figma\"],\"description\":\"Au cours de cette SAé, il était demandé de produire un prototype, un post Instagram ainsi qu'une vidéo de teaser pour l'évènement du concert Coachella.\",\"descriptionEn\":\"During this SAé, we were asked to produce a prototype, an Instagram post, and a teaser video for the Coachella concert event.\",\"image\":[\"/Coachella/coachella.png\",\"/Coachella/analyse.png\",\"/Coachella/moodboard.png\",\"/Coachella/prototype1.png\",\"/Coachella/prototype2.png\",\"/Coachella/prototype3.png\",\"/Coachella/userflow.png\",\"/Coachella/userprofil.png\",\"/Coachella/wireframe.png\"],\"link\":\"https://www.figma.com/design/EQNQfyIacn43dLgTcfJWPY/Gr07---SAE-302---Perrault-Plouseau-Demeerseman-Toutain?node-id=0-1\u0026p=f\u0026t=P5Il4lxMuQMnQu4a-0\",\"github\":null},{\"id\":13,\
